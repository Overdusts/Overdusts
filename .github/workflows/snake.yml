name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Overdusts
          outputs: |
            dist/github-snake.svg?color_snake=%2317140F&color_dots=%23E4DBC8,%23F0B7A5,%23EB7C5E,%23F0522F,%23FF3B12
            dist/github-snake-dark.svg?color_snake=%23FF3B12&color_dots=%23161211,%235c2a20,%238f3a28,%23c9432c,%23FF3B12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
