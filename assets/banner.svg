<svg width="1000" height="220" viewBox="0 0 1000 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="overdusts — the personal record of Sarthak Goyal">
  <!-- paper -->
  <rect width="1000" height="220" fill="#EDE6D6"/>

  <!-- corner crop marks -->
  <g stroke="#FF3B12" stroke-width="1.6" stroke-linecap="square" fill="none">
    <path d="M14 28 V14 H28"/>
    <path d="M986 28 V14 H972"/>
    <path d="M14 192 V206 H28"/>
    <path d="M986 192 V206 H972"/>
  </g>

  <!-- top hairline -->
  <rect x="40" y="50" width="920" height="1" fill="#17140F" opacity="0.45"/>

  <!-- dateline eyebrow -->
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="12" letter-spacing="4.5" fill="#6E655A">THE INTERNET — EST. 2022 — EDITION Nº07 — SOFTWARE · AUTOMATION · BOTS</text>
  <text x="960" y="42" text-anchor="end" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="12" letter-spacing="3" fill="#FF3B12">
    ● LIVE
    <animate attributeName="opacity" values="1;1;0.25;1" keyTimes="0;0.55;0.7;1" dur="2.4s" repeatCount="indefinite"/>
  </text>

  <!-- nameplate -->
  <text x="36" y="150" font-family="'Archivo Black','Arial Black','Helvetica Neue',Arial,sans-serif" font-size="104" letter-spacing="-3" fill="#17140F">overdusts<tspan fill="#FF3B12">.</tspan></text>

  <!-- thick ink rule + travelling vermilion tick (the press roller) -->
  <rect x="40" y="170" width="920" height="3" fill="#17140F"/>
  <rect x="40" y="170" width="96" height="3" fill="#FF3B12">
    <animate attributeName="x" values="40;824;40" dur="9s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.15 1;0.45 0 0.15 1"/>
  </rect>

  <!-- bottom microlabels -->
  <g font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="12" letter-spacing="3" fill="#6E655A">
    <text x="40" y="198">SARTHAK GOYAL</text>
    <text x="960" y="198" text-anchor="end">overdusts.com</text>
  </g>
</svg>
