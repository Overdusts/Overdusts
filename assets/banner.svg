<svg width="1000" height="240" viewBox="0 0 1000 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Overdusts — Sarthak Goyal">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1000" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#A960FF"/>
      <stop offset="0.35" stop-color="#00E5FF"/>
      <stop offset="0.65" stop-color="#FF2BD6"/>
      <stop offset="1" stop-color="#A960FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1000 0" to="1000 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rule" gradientUnits="userSpaceOnUse" x1="320" y1="0" x2="680" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A960FF"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="999" height="239" rx="14" fill="#0D1117" stroke="#21262D"/>
  <rect x="0.5" y="0.5" width="999" height="239" rx="14" fill="url(#grid)"/>
  <ellipse cx="500" cy="105" rx="430" ry="130" fill="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- corner marks -->
  <g stroke="#30363D" stroke-width="1.5" stroke-linecap="round">
    <path d="M22 16 v12 M16 22 h12"/>
    <path d="M978 16 v12 M972 22 h12"/>
    <path d="M22 224 v-12 M16 218 h12"/>
    <path d="M978 224 v-12 M972 218 h12"/>
  </g>

  <!-- eyebrow -->
  <text x="500" y="62" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="13" letter-spacing="6" fill="#8B949E">[ SARTHAK GOYAL ]</text>

  <!-- title -->
  <text x="500" y="136" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="66" font-weight="800" letter-spacing="10" fill="url(#shine)">OVERDUSTS</text>

  <!-- sweeping rule -->
  <rect x="500" y="156" width="0" height="2" rx="1" fill="url(#rule)">
    <animate attributeName="width" values="0;360;360;0" keyTimes="0;0.35;0.65;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="500;320;320;500" keyTimes="0;0.35;0.65;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- caret -->
  <rect x="676" y="48" width="7" height="15" fill="#A960FF">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.3s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom microlabels -->
  <g font-family="ui-monospace,'JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="11" letter-spacing="3" fill="#484F58">
    <text x="36" y="206">EST. 2022</text>
    <text x="500" y="206" text-anchor="middle" fill="#8B949E">AUTOMATION&#160;&#160;×&#160;&#160;WEB3&#160;&#160;×&#160;&#160;CYBERSEC</text>
    <text x="964" y="206" text-anchor="end">SCHYEAHH</text>
  </g>
</svg>
